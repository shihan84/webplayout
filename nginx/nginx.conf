worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        # Channel 1
        application channel1 {
            live on;
            record off;
            hls on;
            hls_path /tmp/hls/channel1;
            hls_fragment 3;
            hls_playlist_length 60;
        }

        # Channel 2
        application channel2 {
            live on;
            record off;
            hls on;
            hls_path /tmp/hls/channel2;
            hls_fragment 3;
            hls_playlist_length 60;
        }

        # Channel 3
        application channel3 {
            live on;
            record off;
            hls on;
            hls_path /tmp/hls/channel3;
            hls_fragment 3;
            hls_playlist_length 60;
        }
    }
}

http {
    server {
        listen 80;

        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /channel1 {
            alias /tmp/hls/channel1;
        }

        location /channel2 {
            alias /tmp/hls/channel2;
        }

        location /channel3 {
            alias /tmp/hls/channel3;
        }
    }
}
